<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa Especial!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            50% { opacity: 1; transform: scale(1.05) translateY(-10px); }
            75% { transform: scale(0.98) translateY(5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-motion-pop { animation: popIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #e65d12; cursor: pointer; margin-top: -6px; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e2e8f0; border-radius: 2px; }
        body { overflow-x: hidden; background-color: #e65d12; }
        #bg-image-layer { background-size: cover; background-position: center; background-repeat: no-repeat; transition: opacity 0.3s ease; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="antialiased min-h-screen relative font-sans selection:bg-white selection:text-[#e65d12]">

    <!-- Pantalla de carga -->
    <div id="initial-loader" class="fixed inset-0 bg-[#e65d12] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <i data-lucide="loader-2" class="w-12 h-12 text-white animate-spin mb-4"></i>
        <p class="text-white font-bold text-lg">Cargando sorpresa...</p>
    </div>

    <div id="bg-gradient-layer" class="fixed inset-0 bg-gradient-to-br from-[#e65d12] via-[#ff7e38] to-[#cc4e0b] -z-20"></div>
    <div id="bg-image-layer" class="fixed inset-0 opacity-0 -z-10"></div>

    <button id="btn-open-settings" class="fixed top-4 right-4 text-white z-40 bg-white/20 p-3 rounded-full backdrop-blur-sm shadow-lg hover:scale-105 active:scale-95">
        <i data-lucide="settings" class="w-6 h-6"></i>
    </button>

    <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden z-20"></div>

    <main class="w-full min-h-screen px-4 flex flex-col items-center justify-center text-center z-10 relative">
        <div id="logo-wrapper" class="transition-transform duration-200 z-30">
            <img id="main-logo" src="LOGO-blanco.jpg" alt="Logo" class="w-40 sm:w-48 mb-8 object-contain mix-blend-screen drop-shadow-2xl" onerror="this.style.display='none'">
        </div>

        <button id="btn-reveal" class="bg-white text-[#e65d12] font-black text-lg py-3 px-8 rounded-full shadow-xl hover:-translate-y-1 transition-all z-30 flex items-center gap-2">
            ¡te lo mereces! <i data-lucide="gift" class="w-5 h-5"></i>
        </button>

        <div id="message-container" class="mt-8 opacity-0 hidden w-full z-30">
            <div id="dynamic-text" class="text-white drop-shadow-md">
                <span id="line-1" class="block">¡SORPRESA!</span>
                <span id="line-2" class="block">Bono único especial para ti</span>
                <span id="line-3" class="block">de 50$ depositados en tu cuenta.</span>
                <span id="line-4" class="block">Feliz día.</span>
            </div>
        </div>
    </main>

    <!-- Modal Password -->
    <div id="password-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h3 class="text-xl font-bold mb-4">Configuración</h3>
            <input type="password" id="settings-password" placeholder="Contraseña" class="w-full border-2 p-3 rounded-xl mb-2 text-center outline-none focus:border-[#e65d12]">
            <p id="pwd-error" class="text-red-500 text-sm mb-4 opacity-0">Incorrecta</p>
            <div class="flex gap-2">
                <button id="btn-cancel-pwd" class="flex-1 bg-gray-100 py-3 rounded-xl">Cancelar</button>
                <button id="btn-submit-pwd" class="flex-1 bg-[#e65d12] text-white py-3 rounded-xl font-bold">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Panel de Ajustes -->
    <aside id="settings-panel" class="fixed top-0 right-0 h-full w-full sm:w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-500 z-50 flex flex-col">
        <div class="p-5 border-b flex justify-between items-center bg-gray-50">
            <h2 class="font-bold flex items-center gap-2 text-gray-800"><i data-lucide="sliders" class="w-5 h-5 text-[#e65d12]"></i> Editor</h2>
            <button id="btn-close-settings"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <!-- Fondos -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label class="block text-xs font-bold text-[#e65d12] mb-3 uppercase">Fondos e Imágenes</label>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1">Imagen de Fondo</label>
                        <input type="file" id="ctrl-bg-upload" accept="image/*" class="w-full text-xs">
                        <button id="btn-remove-bg" class="mt-1 text-[10px] text-red-500 hidden">Remover fondo</button>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1">Subir Logo</label>
                        <input type="file" id="ctrl-img-upload" accept="image/*" class="w-full text-xs">
                    </div>
                </div>
            </div>

            <!-- Ajustes Logo -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                <label class="block text-xs font-bold text-[#e65d12] mb-1 uppercase">Ajustes Logo</label>
                <div>
                    <label class="flex justify-between text-[10px] text-gray-500 mb-1">Escala <span id="val-img-size">100%</span></label>
                    <input type="range" id="ctrl-img-size" min="50" max="250" value="100">
                </div>
                <div>
                    <label class="flex justify-between text-[10px] text-gray-500 mb-1">Eje Y (Vertical) <span id="val-img-y">0px</span></label>
                    <input type="range" id="ctrl-img-y" min="-300" max="300" value="0">
                </div>
            </div>

            <!-- Ajustes Texto -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                <label class="block text-xs font-bold text-[#e65d12] mb-1 uppercase">Ajustes Mensaje</label>
                <div>
                    <label class="flex justify-between text-[10px] text-gray-500 mb-1">Eje Y (Vertical) <span id="val-text-y">0px</span></label>
                    <input type="range" id="ctrl-text-y" min="-300" max="300" value="0">
                </div>
            </div>

            <!-- Líneas Dinámicas -->
            <div id="lines-accordion-container" class="space-y-2"></div>

            <div class="pt-4 border-t space-y-2">
                <button id="btn-save-db" class="w-full bg-[#e65d12] text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="cloud-upload" class="w-5 h-5"></i> GUARDAR Y PUBLICAR
                </button>
                <button id="btn-reset" class="w-full bg-gray-100 py-2 rounded-lg text-sm">Reiniciar Vista</button>
            </div>
        </div>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/20 z-40 hidden opacity-0 transition-opacity"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN PROPORCIONADA POR EL USUARIO
        const firebaseConfig = {
          apiKey: "AIzaSyDBOOT-lJFfRCDvzLoDGlhK8zL3u2R8IMc",
          authDomain: "sorpresas-jgr.firebaseapp.com",
          projectId: "sorpresas-jgr",
          storageBucket: "sorpresas-jgr.firebasestorage.app",
          messagingSenderId: "507602556978",
          appId: "1:507602556978:web:e9900513fc842f7fd5442b"
        };

        const appId = "sorpresa-personalizada-jgr";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado inicial
        let linesConfig = [
            { id: 1, text: "¡SORPRESA!", size: 40, bold: true, color: "#ffffff", align: "center" },
            { id: 2, text: "Bono único especial para ti", size: 32, bold: true, color: "#ffffff", align: "center" },
            { id: 3, text: "de 50$ depositados en tu cuenta.", size: 24, bold: false, color: "#ffffff", align: "center" },
            { id: 4, text: "Feliz día.", size: 28, bold: true, color: "#ffffff", align: "center" }
        ];
        let logoTransform = { x: 0, y: 0, scale: 100 };
        let textTransform = { x: 0, y: 0 };
        let bgImageBase64 = "";
        let logoImageBase64 = "";

        // Inicialización
        async function start() {
            try {
                await signInAnonymously(auth);
                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    linesConfig = data.linesConfig || linesConfig;
                    logoTransform = data.logoTransform || logoTransform;
                    textTransform = data.textTransform || textTransform;
                    bgImageBase64 = data.bgImageBase64 || "";
                    logoImageBase64 = data.logoImageBase64 || "";
                }
                renderUI();
                document.getElementById('initial-loader').classList.add('hidden');
            } catch (e) {
                console.error("Error cargando configuración:", e);
                document.getElementById('initial-loader').classList.add('hidden');
            }
        }

        function renderUI() {
            // Fondo
            if (bgImageBase64) {
                const bg = document.getElementById('bg-image-layer');
                bg.style.backgroundImage = `url(${bgImageBase64})`;
                bg.style.opacity = "1";
                document.getElementById('btn-remove-bg').classList.remove('hidden');
            }
            // Logo
            if (logoImageBase64) {
                const logo = document.getElementById('main-logo');
                logo.src = logoImageBase64;
                logo.classList.remove('mix-blend-screen');
                logo.style.display = 'block';
            }
            // Transformaciones
            document.getElementById('logo-wrapper').style.transform = `translate(${logoTransform.x}px, ${logoTransform.y}px) scale(${logoTransform.scale / 100})`;
            document.getElementById('message-container').style.transform = `translate(${textTransform.x}px, ${textTransform.y}px)`;
            
            // Textos
            linesConfig.forEach(line => {
                const el = document.getElementById(`line-${line.id}`);
                if (el) {
                    el.innerText = line.text;
                    el.style.fontSize = line.size + "px";
                    el.style.color = line.color;
                    el.style.fontWeight = line.bold ? "bold" : "normal";
                    el.style.textAlign = line.align;
                }
            });
            renderEditor();
        }

        function renderEditor() {
            const container = document.getElementById('lines-accordion-container');
            container.innerHTML = "";
            linesConfig.forEach(line => {
                const html = `
                    <div class="p-3 bg-gray-50 border rounded-lg text-xs space-y-2">
                        <input type="text" value="${line.text}" oninput="window.updateLine(${line.id}, 'text', this.value)" class="w-full p-2 rounded border focus:border-[#e65d12] outline-none">
                        <div class="flex gap-2 items-center">
                            <input type="number" value="${line.size}" oninput="window.updateLine(${line.id}, 'size', this.value)" class="w-12 p-1 rounded border">
                            <input type="color" value="${line.color}" oninput="window.updateLine(${line.id}, 'color', this.value)" class="flex-1 h-8 rounded border-0 p-0 bg-transparent cursor-pointer">
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
            lucide.createIcons();
        }

        window.updateLine = (id, field, val) => {
            const line = linesConfig.find(l => l.id === id);
            if(field === 'size') val = parseInt(val);
            line[field] = val;
            renderUI();
        };

        // Compresión y manejo de archivos
        const handleFileUpload = (inputId, type) => {
            document.getElementById(inputId).onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const max = type === 'bg' ? 1200 : 600;
                        if(w > max) { h *= max/w; w = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const b64 = canvas.toDataURL('image/jpeg', 0.75);
                        if(type === 'bg') bgImageBase64 = b64;
                        else logoImageBase64 = b64;
                        renderUI();
                    };
                };
            };
        };

        handleFileUpload('ctrl-bg-upload', 'bg');
        handleFileUpload('ctrl-img-upload', 'logo');

        // Controles de Sliders
        document.getElementById('ctrl-img-size').oninput = e => {
            logoTransform.scale = e.target.value;
            document.getElementById('val-img-size').innerText = e.target.value + "%";
            renderUI();
        };
        document.getElementById('ctrl-img-y').oninput = e => {
            logoTransform.y = e.target.value;
            document.getElementById('val-img-y').innerText = e.target.value + "px";
            renderUI();
        };
        document.getElementById('ctrl-text-y').oninput = e => {
            textTransform.y = e.target.value;
            document.getElementById('val-text-y').innerText = e.target.value + "px";
            renderUI();
        };

        document.getElementById('btn-remove-bg').onclick = () => {
            bgImageBase64 = "";
            document.getElementById('bg-image-layer').style.opacity = "0";
            document.getElementById('btn-remove-bg').classList.add('hidden');
            renderUI();
        };

        // Guardado Final
        document.getElementById('btn-save-db').onclick = async () => {
            const btn = document.getElementById('btn-save-db');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Guardando...';
            lucide.createIcons();

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), {
                    linesConfig, logoTransform, textTransform, bgImageBase64, logoImageBase64
                });
                btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> ¡CAMBIOS PUBLICADOS!';
                btn.classList.replace('bg-[#e65d12]', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'bg-[#e65d12]');
                    lucide.createIcons();
                }, 3000);
            } catch (e) {
                console.error(e);
                btn.innerText = "Error al guardar";
            }
        };

        // Modal y Panel
        document.getElementById('btn-open-settings').onclick = () => {
            document.getElementById('password-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('password-modal').classList.add('opacity-100'), 10);
        };
        document.getElementById('btn-cancel-pwd').onclick = () => {
            document.getElementById('password-modal').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('password-modal').classList.add('hidden'), 300);
        };
        document.getElementById('btn-submit-pwd').onclick = () => {
            if(document.getElementById('settings-password').value === "1234") {
                document.getElementById('password-modal').classList.add('hidden');
                document.getElementById('settings-panel').classList.remove('translate-x-full');
                document.getElementById('overlay').classList.remove('hidden');
                setTimeout(() => document.getElementById('overlay').classList.add('opacity-100'), 10);
            } else {
                document.getElementById('pwd-error').classList.add('opacity-100');
            }
        };
        document.getElementById('btn-close-settings').onclick = () => {
            document.getElementById('settings-panel').classList.add('translate-x-full');
            document.getElementById('overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        };

        document.getElementById('btn-reveal').onclick = () => {
            document.getElementById('message-container').classList.remove('hidden');
            document.getElementById('message-container').classList.add('animate-motion-pop');
            document.getElementById('btn-reveal').style.display = 'none';
            // Efecto Confeti Simple
            for(let i=0; i<60; i++){
                const c = document.createElement('div');
                c.style.cssText = `position:absolute;width:8px;height:8px;background:${['#fff','#000','#ff7e38'][Math.floor(Math.random()*3)]};left:${Math.random()*100}vw;top:-10px;animation:confettiFall ${2+Math.random()*2}s linear forwards;border-radius:2px;z-index:20;`;
                document.getElementById('confetti-container').appendChild(c);
            }
        };

        start();
    </script>
</body>
</html>
